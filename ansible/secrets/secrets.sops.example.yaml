# Template for the market-stream secrets. Copy to secrets.sops.yaml, fill in real values,
# then encrypt IN PLACE with SOPS. Both secrets.sops.yaml and the age private key are
# gitignored (kept local only) — only this example file is tracked:
#
#   cp secrets.sops.example.yaml secrets.sops.yaml
#   # edit secrets.sops.yaml with real values
#   sops --encrypt --in-place secrets.sops.yaml
#
# These can be the SAME values as the spark-k8s repo (market-stream reuses that cluster
# and its Lakekeeper/S3). The streaming job's own catalog secrets (oidc-spark,
# s3-credentials) are created by spark-k8s in the spark-jobs namespace and reused as-is.

# GHCR pull credentials for the private market-stream images (producer + web API), pulled
# into the market-stream namespace. read:packages is enough.
ghcr_username: "REPLACE_WITH_GITHUB_USERNAME"
ghcr_token: "REPLACE_WITH_GHCR_TOKEN"

# Lakekeeper OAuth2 client (Keycloak) — used by the in-cluster Trino's Iceberg REST
# catalog and by the Spark job. Same value as spark-k8s's lakekeeper_client_secret.
lakekeeper_client_id: "lakekeeper"
lakekeeper_client_secret: "REPLACE_WITH_LAKEKEEPER_CLIENT_SECRET"

# S3 credentials for the Hetzner Object Storage warehouse (same as spark-k8s). Used by
# Trino's native S3 filesystem to read the Iceberg data files.
s3_access_key: "REPLACE_WITH_S3_ACCESS_KEY"
s3_secret_key: "REPLACE_WITH_S3_SECRET_KEY"
