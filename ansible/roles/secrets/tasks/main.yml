---
# Materialise the market-stream namespace + its GHCR image-pull secret from SOPS. The
# streaming job's own catalog secrets (oidc-spark, s3-credentials) already exist in the
# spark-jobs namespace — created by the spark-k8s repo — and are reused as-is.

- name: Ensure the Kubernetes Python client is present (for kubernetes.core.k8s)
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
    update_cache: true

- name: Decrypt the SOPS secrets file (kept in-memory; never written to disk)
  ansible.builtin.set_fact:
    _secrets: "{{ lookup('community.sops.sops', sops_secrets_file) | from_yaml }}"
  no_log: true

- name: Ensure the market-stream namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ market_stream_namespace }}"
  environment:
    KUBECONFIG: /root/.kube/config

- name: Create the GHCR image-pull Secret in the market-stream namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ghcr-pull
        namespace: "{{ market_stream_namespace }}"
      type: kubernetes.io/dockerconfigjson
      stringData:
        ".dockerconfigjson": "{{ {'auths': {'ghcr.io': {'username': _secrets.ghcr_username, 'password': _secrets.ghcr_token, 'auth': (_secrets.ghcr_username ~ ':' ~ _secrets.ghcr_token) | b64encode }}} | to_json }}"
  environment:
    KUBECONFIG: /root/.kube/config
  no_log: true
